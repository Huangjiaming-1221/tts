<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI语音生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out; }
        .voice-chip {
            transition: all 0.2s;
        }
        .voice-chip.selected {
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-cyan-100 via-blue-200 to-blue-900 min-h-screen flex items-center justify-center p-4">

    <div class="glass w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-900 mb-2">AI语音生成器</h1>
            <p class="text-blue-600/80 text-sm">多人齐读模式 • 最多同时选5人 • 中英混合</p>
        </div>

        <div class="space-y-6">
            <!-- 模式切换 -->
            <div class="flex bg-white/30 rounded-xl p-1 gap-1">
                <button id="singleMode" class="flex-1 py-2 rounded-lg text-sm font-medium bg-white shadow-sm text-blue-700 transition">单人朗读</button>
                <button id="chorusMode" class="flex-1 py-2 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700 transition">多人齐读</button>
            </div>

            <!-- 音色选择区域 -->
            <div>
                <div class="flex items-center justify-between mb-2">
                    <label class="text-sm font-medium text-gray-700" id="voiceLabel">选择配音角色</label>
                    <span id="selectCount" class="text-xs text-blue-600 hidden">已选 0/5 人</span>
                </div>
                
                <!-- 搜索 -->
                <div class="relative mb-3">
                    <input type="text" id="voiceSearch" placeholder="搜索音色..." class="w-full bg-white/50 border border-blue-100 rounded-xl py-2.5 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <svg class="w-4 h-4 text-gray-400 absolute left-3.5 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>

                <!-- 已选音色标签（齐读模式显示） -->
                <div id="selectedChips" class="flex flex-wrap gap-2 mb-3 hidden"></div>

                <!-- 音色列表 -->
                <div class="max-h-64 overflow-y-auto custom-scrollbar bg-white/30 rounded-xl p-2" id="voiceList"></div>
            </div>

            <!-- 文本输入 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">输入要配音的文本</label>
                <textarea id="textInput" rows="4" class="w-full bg-white/40 border border-blue-100 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none" placeholder="请输入要生成语音的文本...齐读模式下所有人会同时朗读这段内容"></textarea>
                <div class="text-right text-xs text-gray-400 mt-1"><span id="charCount">0</span> / 5000</div>
            </div>

            <!-- 按钮 -->
            <div class="flex flex-col md:flex-row gap-4">
                <button id="generateBtn" class="flex-1 bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 text-white font-semibold py-3.5 rounded-xl shadow-lg transform transition hover:-translate-y-1 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
                    <span id="btnText">生成语音</span>
                </button>
                <button id="clearBtn" class="flex-1 bg-white/40 hover:bg-white/70 text-gray-700 font-semibold py-3.5 rounded-xl border border-white/60 transition flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    清空内容
                </button>
            </div>
        </div>

        <!-- 加载状态 -->
        <div id="loadingState" class="hidden mt-8 text-center">
            <div class="relative w-16 h-16 mx-auto mb-4">
                <div class="absolute inset-0 border-4 border-blue-200 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-blue-500 rounded-full border-t-transparent animate-spin"></div>
            </div>
            <p class="text-blue-800 font-medium" id="loadingText">正在生成语音...</p>
            <div class="w-full bg-gray-200 rounded-full h-2 mt-3 overflow-hidden">
                <div id="progressBar" class="bg-blue-600 h-2 rounded-full transition-all" style="width: 0%"></div>
            </div>
            <p class="text-xs text-gray-500 mt-2" id="progressDetail"></p>
        </div>

        <!-- 单人结果 -->
        <div id="singleResult" class="hidden mt-8 animate-fade-in-up">
            <div class="bg-green-50/80 border border-green-200 rounded-xl p-4 mb-4 flex items-center gap-3">
                <div class="bg-green-100 p-2 rounded-full text-green-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                </div>
                <div>
                    <h3 class="text-green-800 font-bold">语音生成成功！</h3>
                    <p class="text-green-600 text-xs" id="singleVoiceName">使用音色：晓晓</p>
                </div>
            </div>
            <audio id="singleAudio" controls class="w-full mb-4"></audio>
            <a id="singleDownload" href="#" download class="block w-full text-center bg-gray-800 hover:bg-gray-900 text-white font-medium py-3 rounded-xl transition flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                下载音频文件
            </a>
        </div>

        <!-- 齐读结果 -->
        <div id="chorusResult" class="hidden mt-8 animate-fade-in-up">
            <div class="bg-purple-50/80 border border-purple-200 rounded-xl p-4 mb-4 flex items-center gap-3">
                <div class="bg-purple-100 p-2 rounded-full text-purple-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
                </div>
                <div>
                    <h3 class="text-purple-800 font-bold">多人齐读生成成功！</h3>
                    <p class="text-purple-600 text-xs" id="chorusVoices">参与人数：3人</p>
                </div>
            </div>

            <!-- 播放控制 -->
            <div class="bg-white/60 rounded-xl p-4 mb-4 border border-white/50">
                <div class="flex items-center gap-3 mb-3">
                    <button id="playAllBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        同时播放
                    </button>
                    <button id="stopAllBtn" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition hidden">
                        停止播放
                    </button>
                    <span class="text-xs text-gray-500">所有人同时朗读</span>
                </div>
                
                <!-- 独立播放器列表 -->
                <div class="space-y-2" id="audioList"></div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const API_URL = 'https://tts-server-production-0126.up.railway.app';
        
        // ==================== 30种音色 ====================
        const voices = [
            { id: 'zh-CN-XiaoxiaoNeural', name: '晓晓', tag: '温柔女声', cat: '中文女声', desc: '自然亲切，适合新闻、解说' },
            { id: 'zh-CN-XiaohanNeural', name: '晓涵', tag: '知性女声', cat: '中文女声', desc: '成熟稳重，适合纪录片' },
            { id: 'zh-CN-XiaomengNeural', name: '晓梦', tag: '甜美女声', cat: '中文女声', desc: '活泼可爱，适合短视频' },
            { id: 'zh-CN-XiaoyiNeural', name: '晓伊', tag: '可爱女童', cat: '中文女声', desc: '稚嫩童声，适合儿童内容' },
            { id: 'zh-CN-XiaoshuangNeural', name: '晓双', tag: '元气少女', cat: '中文女声', desc: '活力四射，适合广告' },
            { id: 'zh-CN-XiaoqiuNeural', name: '晓秋', tag: '成熟女声', cat: '中文女声', desc: '温婉大方，适合有声书' },
            { id: 'zh-CN-YunyangNeural', name: '云扬', tag: '沉稳男声', cat: '中文男声', desc: '大气稳重，适合新闻播报' },
            { id: 'zh-CN-YunxiNeural', name: '云希', tag: '少年男声', cat: '中文男声', desc: '年轻活力，适合短视频热门' },
            { id: 'zh-CN-YunjianNeural', name: '云健', tag: '解说男声', cat: '中文男声', desc: '清晰有力，适合体育解说' },
            { id: 'zh-CN-YunxiaNeural', name: '云夏', tag: '活泼男声', cat: '中文男声', desc: '轻快明亮，适合娱乐内容' },
            { id: 'zh-CN-YunzeNeural', name: '云泽', tag: '磁性男声', cat: '中文男声', desc: '低沉磁性，适合情感电台' },
            { id: 'zh-CN-YunhaoNeural', name: '云浩', tag: '大气男声', cat: '中文男声', desc: '洪亮正式，适合宣传片' },
            { id: 'zh-CN-henan-YundengNeural', name: '云登', tag: '河南方言', cat: '中文方言', desc: '河南口音，亲切接地气' },
            { id: 'zh-CN-liaoning-YunbiaoNeural', name: '云彪', tag: '东北方言', cat: '中文方言', desc: '东北口音，幽默风趣' },
            { id: 'zh-CN-shaanxi-XiaoniNeural', name: '晓妮', tag: '陕西方言', cat: '中文方言', desc: '陕西口音，质朴温暖' },
            { id: 'zh-HK-HiuMaanNeural', name: '晓曼', tag: '粤语女声', cat: '中文方言', desc: '标准粤语，香港风格' },
            { id: 'zh-TW-HsiaoChenNeural', name: '晓臻', tag: '台湾国语', cat: '中文方言', desc: '台湾口音，温柔甜美' },
            { id: 'zh-TW-YunJheNeural', name: '云哲', tag: '台湾国语', cat: '中文方言', desc: '台湾口音，年轻男声' },
            { id: 'en-US-JennyNeural', name: 'Jenny', tag: '美式女声', cat: '英语美式', desc: '自然流畅，商务首选' },
            { id: 'en-US-AriaNeural', name: 'Aria', tag: '美式女声', cat: '英语美式', desc: '新闻播报风格' },
            { id: 'en-US-AnaNeural', name: 'Ana', tag: '美式女童', cat: '英语美式', desc: '可爱童声，适合儿童' },
            { id: 'en-US-GuyNeural', name: 'Guy', tag: '美式男声', cat: '英语美式', desc: '成熟稳重，纪录片风格' },
            { id: 'en-US-DavisNeural', name: 'Davis', tag: '美式男声', cat: '英语美式', desc: '清晰有力，适合教程' },
            { id: 'en-US-TonyNeural', name: 'Tony', tag: '美式男声', cat: '英语美式', desc: '新闻播报风格' },
            { id: 'en-GB-SoniaNeural', name: 'Sonia', tag: '英式女声', cat: '英语英式', desc: '优雅知性，BBC风格' },
            { id: 'en-GB-LibbyNeural', name: 'Libby', tag: '英式女声', cat: '英语英式', desc: '温暖亲切，适合故事' },
            { id: 'en-GB-MaisieNeural', name: 'Maisie', tag: '英式女童', cat: '英语英式', desc: '可爱童声' },
            { id: 'en-GB-RyanNeural', name: 'Ryan', tag: '英式男声', cat: '英语英式', desc: '年轻活力' },
            { id: 'en-IE-EmilyNeural', name: 'Emily', tag: '爱尔兰女声', cat: '英语其他', desc: '爱尔兰口音，独特韵味' },
            { id: 'en-AU-NatashaNeural', name: 'Natasha', tag: '澳洲女声', cat: '英语其他', desc: '澳大利亚口音' },
            { id: 'en-CA-ClaraNeural', name: 'Clara', tag: '加拿大女声', cat: '英语其他', desc: '加拿大口音' }
        ];

        // ==================== 状态 ====================
        let isChorusMode = false;
        let selectedVoices = [voices[0]]; // 默认选中晓晓
        let audioElements = [];
        let currentPlaying = [];

        // ==================== DOM ====================
        const singleModeBtn = document.getElementById('singleMode');
        const chorusModeBtn = document.getElementById('chorusMode');
        const voiceLabel = document.getElementById('voiceLabel');
        const selectCount = document.getElementById('selectCount');
        const selectedChips = document.getElementById('selectedChips');
        const voiceSearch = document.getElementById('voiceSearch');
        const voiceList = document.getElementById('voiceList');
        const textInput = document.getElementById('textInput');
        const charCount = document.getElementById('charCount');
        const generateBtn = document.getElementById('generateBtn');
        const btnText = document.getElementById('btnText');
        const clearBtn = document.getElementById('clearBtn');
        const loadingState = document.getElementById('loadingState');
        const loadingText = document.getElementById('loadingText');
        const progressBar = document.getElementById('progressBar');
        const progressDetail = document.getElementById('progressDetail');
        const singleResult = document.getElementById('singleResult');
        const singleAudio = document.getElementById('singleAudio');
        const singleVoiceName = document.getElementById('singleVoiceName');
        const singleDownload = document.getElementById('singleDownload');
        const chorusResult = document.getElementById('chorusResult');
        const chorusVoices = document.getElementById('chorusVoices');
        const audioList = document.getElementById('audioList');
        const playAllBtn = document.getElementById('playAllBtn');
        const stopAllBtn = document.getElementById('stopAllBtn');

        // ==================== 模式切换 ====================
        function setMode(chorus) {
            isChorusMode = chorus;
            if (chorus) {
                chorusModeBtn.classList.add('bg-white', 'shadow-sm', 'text-blue-700');
                chorusModeBtn.classList.remove('text-gray-500');
                singleModeBtn.classList.remove('bg-white', 'shadow-sm', 'text-blue-700');
                singleModeBtn.classList.add('text-gray-500');
                voiceLabel.textContent = '选择齐读成员（点击添加/移除）';
                selectCount.classList.remove('hidden');
                selectedChips.classList.remove('hidden');
                btnText.textContent = '生成齐读';
                if (selectedVoices.length === 0) selectedVoices = [voices[0]];
            } else {
                singleModeBtn.classList.add('bg-white', 'shadow-sm', 'text-blue-700');
                singleModeBtn.classList.remove('text-gray-500');
                chorusModeBtn.classList.remove('bg-white', 'shadow-sm', 'text-blue-700');
                chorusModeBtn.classList.add('text-gray-500');
                voiceLabel.textContent = '选择配音角色';
                selectCount.classList.add('hidden');
                selectedChips.classList.add('hidden');
                btnText.textContent = '生成语音';
                selectedVoices = [selectedVoices[0] || voices[0]];
            }
            updateChips();
            renderVoiceList();
        }

        singleModeBtn.addEventListener('click', () => setMode(false));
        chorusModeBtn.addEventListener('click', () => setMode(true));

        // ==================== 已选标签 ====================
        function updateChips() {
            if (!isChorusMode) return;
            selectCount.textContent = `已选 ${selectedVoices.length}/5 人`;
            selectedChips.innerHTML = selectedVoices.map(v => `
                <span class="voice-chip selected px-3 py-1 rounded-full text-xs font-medium flex items-center gap-1">
                    ${v.name}
                    <button onclick="removeVoice('${v.id}')" class="hover:bg-white/20 rounded-full p-0.5">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </span>
            `).join('');
        }

        window.removeVoice = function(id) {
            if (selectedVoices.length <= 1) {
                alert('至少需要保留一个音色');
                return;
            }
            selectedVoices = selectedVoices.filter(v => v.id !== id);
            updateChips();
            renderVoiceList();
        };

        // ==================== 渲染音色列表 ====================
        function renderVoiceList() {
            const filter = voiceSearch.value.toLowerCase();
            const filtered = voices.filter(v => 
                v.name.toLowerCase().includes(filter) ||
                v.tag.toLowerCase().includes(filter) ||
                v.desc.toLowerCase().includes(filter)
            );

            voiceList.innerHTML = '';
            const cats = [...new Set(filtered.map(v => v.cat))];
            
            cats.forEach(cat => {
                const items = filtered.filter(v => v.cat === cat);
                if (items.length === 0) return;

                const header = document.createElement('div');
                header.className = 'px-3 py-1.5 text-xs font-bold text-blue-600 uppercase tracking-wider mt-2 first:mt-0 bg-blue-50/50 rounded-lg';
                header.textContent = cat;
                voiceList.appendChild(header);

                items.forEach(voice => {
                    const isSelected = selectedVoices.some(v => v.id === voice.id);
                    const div = document.createElement('div');
                    div.className = `px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors flex items-center gap-3 ${isSelected ? 'bg-blue-50 border border-blue-200' : ''}`;
                    
                    // 复选框或单选指示
                    const checkIcon = isChorusMode 
                        ? `<div class="w-5 h-5 rounded border-2 flex items-center justify-center ${isSelected ? 'bg-blue-500 border-blue-500' : 'border-gray-300'}">${isSelected ? '<svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>' : ''}</div>`
                        : `<div class="w-4 h-4 rounded-full border-2 ${isSelected ? 'bg-blue-500 border-blue-500' : 'border-gray-300'}">${isSelected ? '<div class="w-2 h-2 bg-white rounded-full mx-auto"></div>' : ''}</div>`;
                    
                    div.innerHTML = `
                        ${checkIcon}
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-medium text-gray-800">${voice.name}</span>
                                <span class="text-xs px-1.5 py-0.5 bg-gray-100 text-gray-600 rounded">${voice.tag}</span>
                            </div>
                            <div class="text-xs text-gray-400">${voice.desc}</div>
                        </div>
                    `;
                    
                    div.onclick = () => toggleVoice(voice);
                    voiceList.appendChild(div);
                });
            });
        }

        function toggleVoice(voice) {
            if (isChorusMode) {
                const idx = selectedVoices.findIndex(v => v.id === voice.id);
                if (idx >= 0) {
                    if (selectedVoices.length > 1) {
                        selectedVoices.splice(idx, 1);
                    }
                } else {
                    if (selectedVoices.length >= 5) {
                        alert('最多选择5人');
                        return;
                    }
                    selectedVoices.push(voice);
                }
                updateChips();
            } else {
                selectedVoices = [voice];
            }
            renderVoiceList();
        }

        voiceSearch.addEventListener('input', renderVoiceList);

        // ==================== 文本输入 ====================
        textInput.addEventListener('input', () => {
            const len = textInput.value.length;
            charCount.textContent = len;
            charCount.className = len > 5000 ? 'text-red-500' : 'text-gray-400';
        });

        clearBtn.addEventListener('click', () => {
            textInput.value = '';
            charCount.textContent = '0';
            singleResult.classList.add('hidden');
            chorusResult.classList.add('hidden');
            loadingState.classList.add('hidden');
            stopAll();
        });

        // ==================== 生成语音 ====================
        generateBtn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            if (!text) { alert('请输入文本内容'); return; }
            if (text.length > 5000) { alert('文本超过5000字符'); return; }

            generateBtn.disabled = true;
            generateBtn.classList.add('opacity-50');
            singleResult.classList.add('hidden');
            chorusResult.classList.add('hidden');
            loadingState.classList.remove('hidden');

            if (isChorusMode) {
                await generateChorus(text);
            } else {
                await generateSingle(text);
            }

            generateBtn.disabled = false;
            generateBtn.classList.remove('opacity-50');
        });

        // 单人模式
        async function generateSingle(text) {
            loadingText.textContent = '正在生成语音...';
            progressBar.style.width = '0%';
            
            const interval = setInterval(() => {
                progressBar.style.width = Math.min(parseFloat(progressBar.style.width) + 5, 90) + '%';
            }, 200);

            try {
                const res = await fetch(`${API_URL}/tts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, voice: selectedVoices[0].id })
                });
                const data = await res.json();
                clearInterval(interval);
                progressBar.style.width = '100%';

                if (data.success) {
                    setTimeout(() => {
                        loadingState.classList.add('hidden');
                        singleResult.classList.remove('hidden');
                        singleVoiceName.textContent = `使用音色：${selectedVoices[0].name}（${selectedVoices[0].tag}）`;
                        singleAudio.src = data.audioUrl;
                        singleDownload.href = data.audioUrl;
                        singleDownload.download = `voice-${selectedVoices[0].name}-${Date.now()}.mp3`;
                    }, 300);
                }
            } catch (err) {
                clearInterval(interval);
                loadingState.classList.add('hidden');
                alert('生成失败：' + err.message);
            }
        }

        // 齐读模式
        async function generateChorus(text) {
            const total = selectedVoices.length;
            loadingText.textContent = `正在生成 ${total} 人齐读...`;
            progressBar.style.width = '0%';
            
            audioElements = [];
            let completed = 0;

            try {
                const promises = selectedVoices.map(async (voice, idx) => {
                    const res = await fetch(`${API_URL}/tts`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text, voice: voice.id })
                    });
                    const data = await res.json();
                    
                    completed++;
                    progressBar.style.width = (completed / total * 100) + '%';
                    progressDetail.textContent = `已完成 ${completed}/${total}：${voice.name}`;
                    
                    return { voice, data };
                });

                const results = await Promise.all(promises);
                progressBar.style.width = '100%';

                setTimeout(() => {
                    loadingState.classList.add('hidden');
                    chorusResult.classList.remove('hidden');
                    chorusVoices.textContent = `参与人数：${total}人（${selectedVoices.map(v => v.name).join('、')}）`;
                    
                    // 渲染独立播放器
                    audioList.innerHTML = results.map((r, i) => `
                        <div class="flex items-center gap-3 bg-white/40 rounded-lg p-2">
                            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-400 to-cyan-400 flex items-center justify-center text-white text-xs font-bold">
                                ${i + 1}
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="text-sm font-medium text-gray-800 truncate">${r.voice.name} - ${r.voice.tag}</div>
                                <audio src="${r.data.audioUrl}" controls class="w-full h-8 mt-1" data-idx="${i}"></audio>
                            </div>
                            <a href="${r.data.audioUrl}" download class="text-blue-500 hover:text-blue-700 p-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                            </a>
                        </div>
                    `).join('');

                    // 收集 audio 元素
                    audioElements = Array.from(audioList.querySelectorAll('audio'));
                }, 300);

            } catch (err) {
                loadingState.classList.add('hidden');
                alert('生成失败：' + err.message);
            }
        }

        // ==================== 同时播放控制 ====================
        playAllBtn.addEventListener('click', () => {
            if (audioElements.length === 0) return;
            
            // 先全部暂停并重置
            audioElements.forEach(a => { a.currentTime = 0; });
            
            // 同时播放
            const playPromises = audioElements.map(a => a.play().catch(() => {}));
            
            playAllBtn.classList.add('hidden');
            stopAllBtn.classList.remove('hidden');

            // 监听结束
            const onEnded = () => {
                const allEnded = audioElements.every(a => a.paused || a.ended);
                if (allEnded) {
                    playAllBtn.classList.remove('hidden');
                    stopAllBtn.classList.add('hidden');
                }
            };
            audioElements.forEach(a => a.onended = onEnded);
        });

        stopAllBtn.addEventListener('click', stopAll);

        function stopAll() {
            audioElements.forEach(a => {
                a.pause();
                a.currentTime = 0;
            });
            playAllBtn.classList.remove('hidden');
            stopAllBtn.classList.add('hidden');
        }

        // ==================== 初始化 ====================
        updateChips();
        renderVoiceList();
    </script>
</body>
</html>
